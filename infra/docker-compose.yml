version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance_portal_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/financeportaldb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: finance_redis
    ports:
      - "6379:6379"
    restart: always

  postgres:
    image: postgres:16
    container_name: finance_portal_postgres
    environment:
      POSTGRES_DB: financeportaldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - finance_portal_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  finance_portal_pgdata:

