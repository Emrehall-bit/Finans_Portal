services:
  redis:
    image: redis:7
    container_name: finance_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  postgres:
    image: postgres:16
    container_name: finance_portal_postgres
    environment:
      POSTGRES_DB: financeportaldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - finance_portal_pgdata:/var/lib/postgresql/data
      - ../backend/docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financeportaldb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak-db-init:
    image: postgres:16
    container_name: finance_portal_keycloak_db_init
    environment:
      PGPASSWORD: postgres
    command:
      - sh
      - -c
      - >
        until pg_isready -h postgres -U postgres -d postgres; do sleep 2; done &&
        psql -h postgres -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'keycloak'" |
        grep -q 1 ||
        psql -h postgres -U postgres -d postgres -c "CREATE DATABASE keycloak"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: finance_portal_keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ../backend/docker/keycloak/realm-import:/opt/keycloak/data/import
    depends_on:
      keycloak-db-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  finance_portal_pgdata: