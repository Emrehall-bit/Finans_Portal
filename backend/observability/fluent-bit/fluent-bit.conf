[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers.conf

[INPUT]
    Name              tail
    Path              /var/log/finance-portal/finance-portal-backend.json
    Tag               finance.portal.logs
    Parser            json_logs
    DB                /tmp/fluent-bit-finance-portal.db
    Read_from_Head    true
    Refresh_Interval  5
    Skip_Long_Lines   On

[FILTER]
    Name          modify
    Match         finance.portal.logs
    Add           service finance-portal-backend

[OUTPUT]
    Name                opensearch
    Match               finance.portal.logs
    Host                opensearch
    Port                9200
    Index               finance-portal-logs
    Logstash_Format     On
    Logstash_Prefix     finance-portal-logs
    Suppress_Type_Name  On
    Replace_Dots        On
    Generate_ID         On
    Trace_Error         On
