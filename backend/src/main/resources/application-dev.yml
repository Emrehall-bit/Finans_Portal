spring:
  flyway:
    enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/financeportaldb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/finance-portal}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/finance-portal/protocol/openid-connect/certs}

market:
  providers:
    evds:
      api:
        # TODO: Move secret management out of profile files in a dedicated step.
        key: ${EVDS_API_KEY:Rb7ROmhyOC}

finnhub:
  api:
    # TODO: Move secret management out of profile files in a dedicated step.
    key: ${FINNHUB_API_KEY:d7f7hshr01qpjqqjo6v0d7f7hshr01qpjqqjo6vg}
